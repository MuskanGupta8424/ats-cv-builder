<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS CV · Example Summary & Work Exp</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #eef2f5;
            display: flex;
            height: 100vh;
            overflow: hidden;
            line-height: 1.4;
        }

        /* --- LEFT PANEL (editor) --- */
        .editor-panel {
            width: 44%;
            background: white;
            overflow-y: auto;
            padding: 20px 20px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.06);
            border-right: 1px solid #dde3e9;
        }

        .editor-header {
            margin-bottom: 16px;
        }

        .editor-header h2 {
            font-weight: 600;
            font-size: 1.6rem;
            color: #0b1e33;
        }

        .editor-header .hint {
            background: #f0f6ff;
            color: #1e4a7a;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-top: 10px;
            border-left: 4px solid #2563eb;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            color: #2c455d;
            margin-bottom: 2px;
        }

        .optional-badge {
            font-weight: 400;
            text-transform: lowercase;
            font-size: 0.65rem;
            background: #e6edf5;
            padding: 2px 6px;
            border-radius: 20px;
            margin-left: 6px;
            color: #1e4a7a;
        }

        input, textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.85rem;
            background: white;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 50px;
        }

        /* card style for both exp and projects */
        .struct-card {
            background: #f9fbfd;
            border-radius: 12px;
            padding: 12px 12px 8px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-header span {
            font-weight: 600;
            font-size: 0.8rem;
            color: #2563eb;
        }
        .remove-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #9aa9b9;
            padding: 0 4px;
        }
        .remove-btn:hover {
            color: #b91c1c;
        }

        .row-fields {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .field {
            flex: 1 1 140px;
        }
        .field input {
            padding: 6px 8px;
            font-size: 0.8rem;
        }

        .add-btn {
            background: #e6edf5;
            border: 1px dashed #2563eb;
            color: #1e3a6b;
            width: 100%;
            padding: 8px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            margin: 8px 0 12px;
            cursor: pointer;
        }

        /* skills category - compact */
        .skills-category-card {
            background: #f9fbfd;
            border-radius: 12px;
            padding: 12px 12px 8px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .category-header input {
            flex: 1;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .skill-tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 6px 0;
        }

        .skill-tag {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            padding: 2px 8px 2px 10px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .remove-skill {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            color: #7f8fa4;
            padding: 0 2px;
        }

        .add-skill-area {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .add-skill-area input {
            flex: 1;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .small-btn {
            background: #edf2f7;
            border: 1px solid #b9c7da;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .print-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            cursor: pointer;
            margin: 12px 0 4px;
        }

        /* --- RIGHT PANEL (preview) - OPTIMIZED FOR ONE PAGE --- */
        .preview-panel {
            width: 56%;
            background: #4a4e54;
            padding: 15px 15px;
            display: flex;
            justify-content: center;
            overflow-y: auto;
        }

        #resume-preview {
            background: white;
            width: 210mm;
            max-width: 100%;
            min-height: 297mm;
            padding: 5mm 8mm;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            color: #1a2634;
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 10.5px;
            line-height: 1.35;
        }

        #resume-preview h1 {
            font-size: 22px;
            margin: 0 0 2px 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .contact-line {
            font-size: 10px;
            margin-bottom: 4px;
            border-bottom: 1px solid #9aaebf;
            padding-bottom: 3px;
        }

        #resume-preview h2 {
            font-size: 13px;
            border-bottom: 1px solid #111;
            padding-bottom: 2px;
            margin: 8px 0 4px 0;
            text-transform: uppercase;
            font-weight: 600;
        }

        .preview-item {
            margin-bottom: 6px;
        }
        .item-title {
            font-weight: 700;
            font-size: 11px;
        }
        .item-sub {
            font-weight: 600;
            color: #2c3e50;
        }
        .item-date {
            font-weight: 400;
            color: #4a5b6b;
            font-size: 9.5px;
        }
        .item-desc {
            margin-left: 4px;
            margin-top: 1px;
            font-size: 9.5px;
            white-space: pre-line;
        }
        .preview-skills-group {
            margin-bottom: 4px;
        }
        .preview-category {
            font-weight: 700;
            font-size: 10.5px;
            color: #0b2b44;
        }
        .preview-items {
            line-height: 1.4;
            font-size: 10px;
        }

        @media print {
            body { background: white; display: block; height: auto; overflow: visible; }
            .editor-panel { display: none; }
            .preview-panel { display: block; width: 100%; padding: 0; background: white; }
            #resume-preview { width: 100%; padding: 5mm 8mm; box-shadow: none; min-height: 0; }
            a { text-decoration: none; color: black; }
        }
    </style>
</head>
<body>

<!-- LEFT EDITOR PANEL -->
<div class="editor-panel">
    <div class="editor-header">
        <h2>One-Page ATS CV</h2>
    </div>

    <!-- Basic Details -->
    <div style="display: flex; gap: 8px;">
        <div class="form-group" style="flex:2"><label>Full name</label><input type="text" id="inp-name" oninput="refreshPreview()" value="JORDAN MILLER"></div>
        <div class="form-group" style="flex:1"><label>Phone</label><input type="text" id="inp-phone" oninput="refreshPreview()" value="+1 (555) 123-4567"></div>
    </div>
    <div style="display: flex; gap: 8px;">
        <div class="form-group" style="flex:1"><label>Email</label><input type="email" id="inp-email" oninput="refreshPreview()" value="jordan.miller@email.com"></div>
        <div class="form-group" style="flex:1"><label>LinkedIn</label><input type="url" id="inp-linkedin" oninput="refreshPreview()" value="https://linkedin.com/in/jordanmiller"></div>
    </div>
    <div style="display: flex; gap: 8px;">
        <div class="form-group" style="flex:1"><label>GitHub</label><input type="url" id="inp-github" oninput="refreshPreview()" value="https://github.com/jordanmiller"></div>
        <div class="form-group" style="flex:1"><label>Portfolio</label><input type="url" id="inp-portfolio" oninput="refreshPreview()" value="https://jordanmiller.dev"></div>
    </div>

    <!-- Summary (EXAMPLE CONTENT - not your provided text) -->
    <div class="form-group">
        <label>Professional summary (example)</label>
        <textarea id="inp-summary" oninput="refreshPreview()" rows="3">Results-driven Full Stack Developer with 4+ years of experience building scalable web applications. Proficient in React, Node.js, and cloud technologies. Passionate about clean code, performance optimization, and mentoring junior developers. Strong track record of delivering projects on time and exceeding client expectations.</textarea>
    </div>

    <!-- WORK EXPERIENCE (structured) - EXAMPLE CONTENT -->
    <div style="margin: 10px 0 4px;"><label>💼 WORK EXPERIENCE (example)</label></div>
    <div id="exp-container"></div>
    <button class="add-btn" id="addExpBtn">➕ Add work experience</button>

    <!-- PROJECTS (structured, example content) -->
    <div style="margin: 10px 0 4px;"><label>📁 PROJECTS (example)</label></div>
    <div id="projects-container"></div>
    <button class="add-btn" id="addProjectBtn">➕ Add project</button>

    <!-- SKILLS CATEGORIES -->
    <div style="margin: 10px 0 4px;"><label>📂 SKILL CATEGORIES</label></div>
    <div id="skills-categories-container"></div>
    <button class="add-btn" id="addCategoryBtn">➕ Add category</button>

    <!-- Education (simple textarea) -->
    <div class="form-group">
        <label>Education (example)</label>
        <textarea id="inp-education" oninput="refreshPreview()" rows="2">B.S. Computer Science, University of Washington, 2020
Full Stack Web Development Certification, Coursera</textarea>
    </div>

    <div class="action-bar">
        <button class="print-btn" onclick="window.print()">📄 Download PDF (One Page)</button>
    </div>
</div>

<!-- RIGHT PREVIEW PANEL -->
<div class="preview-panel">
    <div id="resume-preview">
        <h1 id="out-name">JORDAN MILLER</h1>
        <div class="contact-line" id="contact-line-preview"></div>

        <h2>Professional Summary</h2>
        <p id="out-summary"></p>

        <h2>Technical Skills</h2>
        <div id="out-skills-preview"></div>

        <h2>Work Experience</h2>
        <div id="out-experience-preview"></div>

        <h2>Projects</h2>
        <div id="out-projects-preview"></div>

        <h2>Education</h2>
        <div id="out-education" class="preview-item item-desc"></div>
    </div>
</div>

<script>
    // Data models
    let skillCategories = [];
    let workExperiences = [];
    let projects = [];

    // Default skills (unchanged)
    skillCategories = [
        { name: "Programming Language", skills: ["JavaScript", "Java (Core Java)"] },
        { name: "Frontend Development", skills: ["ReactJS", "Next.js", "JavaScript (ES6+)", "TypeScript", "HTML5", "CSS3", "Tailwind CSS", "Bootstrap", "Styled Components", "React Hooks", "Redux", "Context API"] },
        { name: "Backend Development", skills: ["Node.js", "Express.js", "REST API", "Axios", "Fetch API"] },
        { name: "Database Technologies", skills: ["MongoDB", "MySQL", "Firebase"] },
        { name: "Cloud & DevOps", skills: ["CI/CD Pipelines", "AWS (Basic)", "Linux / Ubuntu"] },
        { name: "UI / Animation & Design Tools", skills: ["GSAP", "Framer Motion", "Adobe XD", "Canva"] },
        { name: "Tools & Environment", skills: ["Git", "GitHub", "VS Code", "Cursor AI", "Postman", "Basic Jira"] },
        { name: "Computer Science Fundamentals", skills: ["OOP", "Data Structures & Algorithms (Basic)"] },
        { name: "Web & Software Practices", skills: ["SEO Basics", "Agile Methodologies"] }
    ];

    // WORK EXPERIENCES - EXAMPLE CONTENT (not your provided text)
    workExperiences = [
        {
            title: "Full Stack Developer",
            company: "InnovateTech Solutions",
            date: "01/2022 - Present",
            description: "- Lead development of customer-facing dashboard using React and Node.js\n- Reduced API response time by 40% through query optimization and caching\n- Mentored 3 junior developers and conducted code reviews\n- Collaborated with product team to define technical requirements"
        },
        {
            title: "Frontend Developer",
            company: "Creative Digital Agency",
            date: "06/2020 - 12/2021",
            description: "- Built responsive marketing websites for major clients\n- Implemented interactive animations with GSAP and Framer Motion\n- Ensured cross-browser compatibility and mobile-first design\n- Worked in agile environment with 2-week sprints"
        },
        {
            title: "Junior Web Developer",
            company: "StartUp Labs",
            date: "01/2020 - 05/2020",
            description: "- Assisted in developing internal tools using React and Firebase\n- Fixed bugs and improved UI consistency\n- Participated in daily stand-ups and sprint planning"
        }
    ];

    // PROJECTS - EXAMPLE CONTENT (structured, not your provided text)
    projects = [
        {
            name: "E-commerce Platform",
            technologies: "React, Node.js, MongoDB, Stripe API",
            description: "- Built a full-stack e-commerce site with product catalog and cart\n- Implemented user authentication and payment processing\n- Achieved 95+ Lighthouse score for performance"
        },
        {
            name: "Task Management App",
            technologies: "Next.js, Tailwind, Firebase, Framer Motion",
            description: "- Created a collaborative task board with real-time updates\n- Integrated Firebase Auth and Firestore for data persistence\n- Added drag-and-drop functionality and smooth animations"
        },
        {
            name: "Portfolio Website",
            technologies: "React, GSAP, Styled Components",
            description: "- Designed and developed personal portfolio with custom animations\n- Optimized for SEO and fast loading\n- Featured case studies and contact form"
        }
    ];

    // Get containers
    const expContainer = document.getElementById('exp-container');
    const projectContainer = document.getElementById('projects-container');
    const skillsContainer = document.getElementById('skills-categories-container');
    const addExpBtn = document.getElementById('addExpBtn');
    const addProjectBtn = document.getElementById('addProjectBtn');
    const addCatBtn = document.getElementById('addCategoryBtn');

    // Helper escape
    function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"]/g, function(m) {
            if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
            return m;
        });
    }

    // Render work experience editor
    function renderExpEditor() {
        let html = '';
        workExperiences.forEach((exp, idx) => {
            html += `<div class="struct-card">`;
            html += `<div class="card-header"><span>Work #${idx+1}</span><button class="remove-btn" onclick="removeExp(${idx})">✕</button></div>`;
            html += `<div class="row-fields">`;
            html += `<div class="field"><input type="text" value="${escapeHtml(exp.title)}" oninput="updateExp(${idx}, 'title', this.value)" placeholder="Job Title"></div>`;
            html += `<div class="field"><input type="text" value="${escapeHtml(exp.company)}" oninput="updateExp(${idx}, 'company', this.value)" placeholder="Company"></div>`;
            html += `<div class="field"><input type="text" value="${escapeHtml(exp.date)}" oninput="updateExp(${idx}, 'date', this.value)" placeholder="Date (e.g. 06/2024 - Present)"></div>`;
            html += `</div>`;
            html += `<textarea oninput="updateExp(${idx}, 'description', this.value)" placeholder="Description (use bullet points)" rows="2">${escapeHtml(exp.description)}</textarea>`;
            html += `</div>`;
        });
        expContainer.innerHTML = html;
        refreshPreview();
    }

    // Render projects editor
    function renderProjectEditor() {
        let html = '';
        projects.forEach((proj, idx) => {
            html += `<div class="struct-card">`;
            html += `<div class="card-header"><span>Project #${idx+1}</span><button class="remove-btn" onclick="removeProject(${idx})">✕</button></div>`;
            html += `<div class="row-fields">`;
            html += `<div class="field"><input type="text" value="${escapeHtml(proj.name)}" oninput="updateProject(${idx}, 'name', this.value)" placeholder="Project Name"></div>`;
            html += `<div class="field"><input type="text" value="${escapeHtml(proj.technologies)}" oninput="updateProject(${idx}, 'technologies', this.value)" placeholder="Technologies"></div>`;
            html += `</div>`;
            html += `<textarea oninput="updateProject(${idx}, 'description', this.value)" placeholder="Description (bullet points)" rows="2">${escapeHtml(proj.description)}</textarea>`;
            html += `</div>`;
        });
        projectContainer.innerHTML = html;
        refreshPreview();
    }

    // Render skills editor
    function renderSkillsEditor() {
        let html = '';
        skillCategories.forEach((cat, idx) => {
            html += `<div class="skills-category-card">`;
            html += `<div class="category-header">`;
            html += `<input type="text" value="${escapeHtml(cat.name)}" oninput="updateCategoryName(${idx}, this.value)" placeholder="Category">`;
            html += `<button class="remove-btn" onclick="removeCategory(${idx})">✕</button>`;
            html += `</div>`;
            html += `<div class="skill-tag-container">`;
            cat.skills.forEach((skill, skillIdx) => {
                html += `<div class="skill-tag"><span>${escapeHtml(skill)}</span><button class="remove-skill" onclick="removeSkill(${idx}, ${skillIdx})">✕</button></div>`;
            });
            html += `</div>`;
            html += `<div class="add-skill-area">`;
            html += `<input type="text" id="new-skill-${idx}" placeholder="Add skill">`;
            html += `<button class="small-btn" onclick="addSkillToCategory(${idx})">Add</button>`;
            html += `</div>`;
            html += `</div>`;
        });
        skillsContainer.innerHTML = html;
        refreshPreview();
    }

    // Event handlers
    window.updateExp = (idx, field, value) => { workExperiences[idx][field] = value; refreshPreview(); };
    window.removeExp = (idx) => { workExperiences.splice(idx, 1); renderExpEditor(); };
    window.updateProject = (idx, field, value) => { projects[idx][field] = value; refreshPreview(); };
    window.removeProject = (idx) => { projects.splice(idx, 1); renderProjectEditor(); };
    window.updateCategoryName = (idx, val) => { skillCategories[idx].name = val; refreshPreview(); };
    window.removeCategory = (idx) => { skillCategories.splice(idx, 1); renderSkillsEditor(); };
    window.removeSkill = (catIdx, skillIdx) => { skillCategories[catIdx].skills.splice(skillIdx, 1); renderSkillsEditor(); };
    window.addSkillToCategory = (catIdx) => {
        const input = document.getElementById(`new-skill-${catIdx}`);
        if (input.value.trim()) {
            skillCategories[catIdx].skills.push(input.value.trim());
            input.value = '';
            renderSkillsEditor();
        }
    };

    addExpBtn.addEventListener('click', () => {
        workExperiences.push({ title: "", company: "", date: "", description: "" });
        renderExpEditor();
    });
    addProjectBtn.addEventListener('click', () => {
        projects.push({ name: "", technologies: "", description: "" });
        renderProjectEditor();
    });
    addCatBtn.addEventListener('click', () => {
        skillCategories.push({ name: "New Category", skills: [] });
        renderSkillsEditor();
    });

    // Refresh preview
    window.refreshPreview = function() {
        document.getElementById('out-name').innerText = document.getElementById('inp-name').value || "YOUR NAME";
        const email = document.getElementById('inp-email').value;
        const phone = document.getElementById('inp-phone').value;
        const linkedin = document.getElementById('inp-linkedin').value;
        const github = document.getElementById('inp-github').value;
        const portfolio = document.getElementById('inp-portfolio').value;
        let contactHTML = `${email} | ${phone}`;
        if (linkedin) contactHTML += ` | <a href="${linkedin}">LinkedIn</a>`;
        if (github) contactHTML += ` | <a href="${github}">GitHub</a>`;
        if (portfolio) contactHTML += ` | <a href="${portfolio}">Portfolio</a>`;
        document.getElementById('contact-line-preview').innerHTML = contactHTML;

        document.getElementById('out-summary').innerText = document.getElementById('inp-summary').value;

        // Skills preview
        let skillsHTML = '';
        skillCategories.forEach(cat => {
            if (cat.skills.length) {
                skillsHTML += `<div class="preview-skills-group"><span class="preview-category">${cat.name}:</span> <span class="preview-items">${cat.skills.join(', ')}</span></div>`;
            }
        });
        document.getElementById('out-skills-preview').innerHTML = skillsHTML;

        // Work experience preview
        let expHTML = '';
        workExperiences.forEach(exp => {
            if (exp.title || exp.company) {
                expHTML += `<div class="preview-item">`;
                expHTML += `<span class="item-title">${exp.title}</span> – <span class="item-sub">${exp.company}</span> <span class="item-date">(${exp.date})</span>`;
                if (exp.description) {
                    expHTML += `<div class="item-desc">${exp.description.replace(/\n/g, '<br>')}</div>`;
                }
                expHTML += `</div>`;
            }
        });
        document.getElementById('out-experience-preview').innerHTML = expHTML;

        // Projects preview
        let projHTML = '';
        projects.forEach(proj => {
            if (proj.name) {
                projHTML += `<div class="preview-item">`;
                projHTML += `<span class="item-title">${proj.name}</span>`;
                if (proj.technologies) projHTML += ` <span class="item-sub">(${proj.technologies})</span>`;
                if (proj.description) {
                    projHTML += `<div class="item-desc">${proj.description.replace(/\n/g, '<br>')}</div>`;
                }
                projHTML += `</div>`;
            }
        });
        document.getElementById('out-projects-preview').innerHTML = projHTML;

        document.getElementById('out-education').innerHTML = document.getElementById('inp-education').value.replace(/\n/g, '<br>');
    };

    // Initial render
    renderExpEditor();
    renderProjectEditor();
    renderSkillsEditor();
</script>
</body>
</html>
